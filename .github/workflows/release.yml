name: Build and Release PowerBrightnessSync

on:
  push:
    tags:
      - 'v*.*.*'       # 只有打标签时才发布 Release
    branches:
      - main           # main 分支提交只触发构建和上传 Artifact，不发布 Release
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
    # 1️⃣ 检出代码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ 配置 MSVC 编译环境 (替代手写的 vswhere)
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # 3️⃣ 创建输出目录
    - name: Create build directory
      run: mkdir build

    # 4️⃣ 编译 (核心优化部分)
    # /MT: 静态链接运行库，无需用户安装 VC++ Redistributable
    # /DUNICODE /D_UNICODE: 强制 Unicode 模式，适配 wWinMain
    # /MANIFESTUAC: 嵌入管理员权限请求，图标会自动带盾牌
    - name: Compile PowerBrightnessSync
      shell: cmd
      run: |
        cl /nologo /EHsc /std:c++17 /O2 /MT ^
        /DUNICODE /D_UNICODE /D_WIN32_WINNT=0x0601 ^
        PowerBrightnessSync.cpp ^
        /link /SUBSYSTEM:WINDOWS ^
        /MANIFEST:EMBED /MANIFESTUAC:"level='requireAdministrator' uiAccess='false'" ^
        PowrProf.lib User32.lib Shell32.lib Advapi32.lib Ole32.lib ^
        /OUT:build\PowerBrightnessSync.exe

    # 5️⃣ 压缩文件
    - name: Zip executable
      shell: powershell
      run: |
        Compress-Archive -Path build\PowerBrightnessSync.exe -DestinationPath build\PowerBrightnessSync.zip

    # 6️⃣ 上传构建产物 (方便在不发版的情况下测试)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PowerBrightnessSync-Build
        path: build/PowerBrightnessSync.exe

    # 7️⃣ 发布 Release (仅当检测到 Tag 时执行)
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/PowerBrightnessSync.exe
          build/PowerBrightnessSync.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}