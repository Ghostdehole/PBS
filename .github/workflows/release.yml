name: Build and Release PowerBrightnessSync

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'       # 支持语义化版本标签 v1.0.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
    # 1️⃣ 检出代码
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ 安装 vswhere，用于定位 Visual Studio
    - name: Install vswhere
      shell: powershell
      run: |
        Invoke-WebRequest -Uri https://github.com/microsoft/vswhere/releases/download/2.8.4/vswhere.exe -OutFile vswhere.exe

    # 3️⃣ 找到最新 Visual Studio 的安装路径
    - name: Find Visual Studio installation path
      id: vs
      shell: powershell
      run: |
        $path = .\vswhere.exe -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        Write-Output "VS_PATH=$path" >> $env:GITHUB_ENV

    # 4️⃣ 创建输出目录
    - name: Create build directory
      run: mkdir build

    # 5️⃣ 编译 PowerBrightnessSync.cpp
    - name: Compile PowerBrightnessSync
      shell: cmd
      run: |
        call "%VS_PATH%\VC\Auxiliary\Build\vcvarsall.bat" x64
        cl /EHsc /std:c++17 /D_WIN32_WINNT=0x0601 /O2 PowerBrightnessSync.cpp /link PowrProf.lib user32.lib shell32.lib advapi32.lib /OUT:build\PowerBrightnessSync.exe

    # 6️⃣ 压缩 exe
    - name: Zip executable
      shell: powershell
      run: |
        Compress-Archive -Path build\PowerBrightnessSync.exe -DestinationPath build\PowerBrightnessSync.zip

    # 7️⃣ 确定 Release 版本号
    - name: Determine release version
      id: version
      shell: pwsh
      run: |
        if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
            echo "tag_name=$tag" | Out-File -Encoding utf8 -Append $env:GITHUB_OUTPUT
        }
        else {
            echo "tag_name=v$($env:GITHUB_RUN_NUMBER)" | Out-File -Encoding utf8 -Append $env:GITHUB_OUTPUT
        }

    # 8️⃣ 创建 GitHub Release
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag_name }}
        name: PowerBrightnessSync ${{ steps.version.outputs.tag_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 9️⃣ 上传 exe/zip 到 Release
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: build/PowerBrightnessSync.exe, build/PowerBrightnessSync.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
